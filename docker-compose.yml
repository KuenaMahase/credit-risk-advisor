# Everything runs in compose: the assistant app and the monitoring dashboard
# share one image (built once) and one SQLite volume (the app writes
# conversations and feedback; the dashboard reads them).
#
#   docker compose up --build     # first build ~6 minutes
#   app:       http://localhost:8501
#   dashboard: http://localhost:8502
#
# Requires .env at the repo root with OPENAI_API_KEY (see .env.example).

services:
  app:
    build: .
    image: credit-risk-advisor
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      ADVISOR_DB_PATH: /data/advisor.db
    volumes:
      - monitoring_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    image: credit-risk-advisor
    command: ["streamlit", "run", "monitoring/dashboard.py",
              "--server.port=8502", "--server.address=0.0.0.0"]
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8502:8502"
    environment:
      ADVISOR_DB_PATH: /data/advisor.db
    volumes:
      - monitoring_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8502/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  monitoring_data:
