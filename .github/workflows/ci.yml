name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q app eval ingestion monitoring rag tests streamlit_app.py

      - name: Type-check Python sources
        run: npx --yes pyright@1.1.411 --pythonpath "$(which python)"

      - name: Run unit and Streamlit smoke tests
        run: python -m unittest discover -s tests -v
